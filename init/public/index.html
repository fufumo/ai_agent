<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 智能体（本地Qwen）</title>

<style>
body {
    font-family: "Microsoft YaHei";
    background: #f5f6fa;
    margin: 0;
}

.container {
    width: 900px;
    margin: 30px auto;
}

.title {
    font-size: 22px;
    margin-bottom: 15px;
}

.chat {
    background: #fff;
    height: 400px;
    overflow-y: auto;
    border-radius: 10px;
    padding: 15px;
}

.msg {
    margin: 10px 0;
}

.user {
    text-align: right;
    color: #2563eb;
}

.ai {
    text-align: left;
    color: #111;
}

.json {
    background: #111;
    color: #0f0;
    padding: 10px;
    border-radius: 6px;
    font-family: monospace;
    white-space: pre-wrap;
}

.inputBox {
    display: flex;
    margin-top: 10px;
}

textarea {
    flex: 1;
    height: 60px;
    padding: 10px;
}

button {
    width: 120px;
    background: #2563eb;
    color: #fff;
    border: none;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">🚀 本地 AI 智能体（Qwen）</div>

    <div class="chat" id="chat"></div>

    <div class="inputBox">
        <textarea id="input" placeholder="例如：查待处理订单"></textarea>
        <button onclick="send()">执行</button>
    </div>

</div>

<script>

let history = [];

function add(role, text, isJson=false) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;

    if(isJson){
        div.innerHTML = `<div class="json">${text}</div>`;
    }else{
        div.innerText = text;
    }

    document.getElementById('chat').appendChild(div);
}

async function send() {

    const input = document.getElementById('input');
    const text = input.value.trim();
    if(!text) return;

    add('user', text);

    const res = await fetch('/api/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            message: text,
            systemPrompt: buildPrompt(),
            history
        })
    });

    const data = await res.json();

    let reply = data.reply || '';

    // 尝试解析 JSON
    try {
        let json = JSON.parse(reply);
        add('ai', JSON.stringify(json, null, 2), true);

        // 自动执行
        runAction(json);

    } catch {
        add('ai', reply);
    }

    history.push({ role: 'user', content: text });
    history.push({ role: 'assistant', content: reply });

    input.value = '';
}

function buildPrompt() {
    return `
你是订单系统智能体，只能返回 JSON：

{
  "module": "order",
  "action": "",
  "args": {}
}

规则：
1. 不允许解释
2. 不允许输出多余文字
3. module 固定为 order
4. action 只能是：
   list / updateMark / delete / remark

mark含义：
1 待处理
2 处理中
3 已处理
4 备注

示例：
用户：查待处理订单
返回：
{
  "module": "order",
  "action": "list",
  "args": { "mark": 1 }
}
`;
}

async function runAction(json) {

    if(json.module !== 'order') return;

    let url = '';
    let method = 'GET';
    let body = null;

    switch(json.action) {

        case 'list':
            url = '/api/order/list?mark=' + (json.args.mark || '');
            break;

        case 'updateMark':
            url = '/api/order/updateMark';
            method = 'POST';
            body = json.args;
            break;

        case 'delete':
            url = '/api/order/delete';
            method = 'POST';
            body = json.args;
            break;

        case 'remark':
            url = '/api/order/remark';
            method = 'POST';
            body = json.args;
            break;
    }

    if(!url) return;

    const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : null
    });

    const result = await res.json();

    add('ai', "执行结果：\n" + JSON.stringify(result, null, 2), true);
}

</script>

</body>
</html>
