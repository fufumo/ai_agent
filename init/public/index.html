<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>Ollama AI 业务助手</title>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="app" class="max-w-6xl mx-auto p-6">
        
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100">
                <div class="text-xs text-gray-400 uppercase font-bold">Layer 1: 模块识别</div>
                <div class="mt-1 text-lg font-medium text-blue-600">{{ currentModule || '等待中...' }}</div>
            </div>
            <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100">
                <div class="text-xs text-gray-400 uppercase font-bold">Layer 2: 动作识别</div>
                <div class="mt-1 text-lg font-medium text-green-600">{{ currentAction || '等待中...' }}</div>
            </div>
            <div class="p-4 bg-white rounded-xl shadow-sm border border-gray-100">
                <div class="text-xs text-gray-400 uppercase font-bold">Layer 3: 参数提取</div>
                <div class="mt-1 text-xs font-mono bg-gray-50 p-1 rounded">{{ currentArgs || '{}' }}</div>
            </div>
        </div>

        <div class="relative mb-10">
            <input 
                v-model="inputText" 
                @keyup.enter="handleSend"
                placeholder="尝试说：把第二个订单的金额改为 998..."
                class="w-full p-5 pr-16 bg-white shadow-lg rounded-2xl border-none focus:ring-2 focus:ring-black transition-all text-lg"
                :disabled="loading"
            />
            <button 
                @click="handleSend"
                class="absolute right-4 top-4 p-2 bg-black text-white rounded-xl hover:bg-gray-800 disabled:bg-gray-300 transition-colors"
                :disabled="loading"
            >
                <span v-if="!loading">发送</span>
                <span v-else class="flex space-x-1">
                    <span class="w-1.5 h-1.5 bg-white rounded-full animate-bounce"></span>
                    <span class="w-1.5 h-1.5 bg-white rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                </span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4">
                <div v-if="tableData.length > 0" class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 text-gray-400 text-xs uppercase">
                            <tr>
                                <th class="p-4 font-semibold" v-for="key in Object.keys(tableData[0])" :key="key">{{ key }}</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(item, idx) in tableData" :key="idx" class="border-t border-gray-50 hover:bg-gray-50 transition-colors">
                                <td class="p-4 text-sm" v-for="val in item" :key="val">
                                    <span v-if="typeof val === 'number' && val > 1000" class="font-mono font-bold">{{ val.toLocaleString() }}</span>
                                    <span v-else>{{ val }}</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div v-else-if="!loading" class="h-64 flex items-center justify-center border-2 border-dashed border-gray-200 rounded-2xl text-gray-400">
                    暂无执行结果，请在上方输入指令
                </div>
            </div>

            <div class="bg-gray-900 rounded-2xl p-5 text-green-400 font-mono text-xs overflow-auto shadow-2xl h-[500px]">
                <div class="mb-2 text-gray-500">// Ollama AI 实时推理日志</div>
                <pre>{{ jsonOutput }}</pre>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const inputText = ref('');
                const loading = ref(false);
                const tableData = ref([]);
                const currentModule = ref('');
                const currentAction = ref('');
                const currentArgs = ref('');
                const jsonOutput = ref('Waiting for command...');

                const handleSend = async () => {
                    if (!inputText.value.trim()) return;

                    loading.value = true;
                    jsonOutput.value = "> 正在通过 Ollama 进行语义分析...";
                    
                    try {
                        const res = await fetch('/api/agent/dispatch', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: inputText.value })
                        });
                        const data = await res.json();
                        
                        // 1. 更新分析状态
                        if (data.analysis) {
                            currentModule.value = data.analysis.module;
                            currentAction.value = data.analysis.action;
                            currentArgs.value = JSON.stringify(data.analysis.args);
                        }

                        // 2. 格式化日志输出
                        jsonOutput.value = JSON.stringify(data, null, 2);
                        
                        // 3. 渲染结果
                        if (data.success) {
                            // 兼容单个对象和数组
                            const result = data.result;
                            tableData.value = Array.isArray(result) ? result : (result ? [result] : []);
                            if (!data.analysis.action.includes('list')) {
                                // 如果是更新或创建，通常返回受影响的行，可以给个提示
                                console.log('操作执行成功');
                            }
                        } else {
                            alert('AI 理解失败: ' + data.msg);
                        }
                    } catch (e) {
                        jsonOutput.value = `Error: ${e.message}`;
                    } finally {
                        loading.value = false;
                    }
                };

                return { 
                    inputText, loading, tableData, 
                    currentModule, currentAction, currentArgs, 
                    jsonOutput, handleSend 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
