<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI Agent 控制台</title>

<style>
/* 定义自定义字体 */
@font-face {
    font-family: "MainFont"; 
    src: url("fonts/main.ttf"); /* 确保路径正确 */
    font-display: swap;
}

body {
    margin: 0;
    /* 将 MainFont 放在最前面，MiSans 作为备选 */
    font-family: "MainFont", sans-serif;
    background: #f4f7fb;
}

/* 顶部 */
.header {
    height: 60px;
    background: #1677ff;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 20px;
    font-size: 18px;
}

/* 输入区 */
.input-bar {
    display: flex;
    padding: 15px;
    background: #fff;
    border-bottom: 1px solid #eee;
}

textarea {
    flex: 1;
    height: 60px;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 10px;
    font-size: 14px;
}

button {
    width: 120px;
    margin-left: 10px;
    background: #1677ff;
    border: none;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
}

/* 主体 */
.container {
    display: flex;
    height: calc(100vh - 120px);
}

/* 左侧表格 */
.left {
    width: 60%;
    background: #fff;
    padding: 10px;
    overflow: auto;
}

/* 右侧JSON */
.right {
    width: 40%;
    background: #0f172a;
    color: #0f0;
    padding: 10px;
    font-family: monospace;
    overflow: auto;
}

/* 表格 */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #1677ff;
    color: #fff;
    padding: 10px;
    text-align: left;
}

td {
    padding: 8px;
    border-bottom: 1px solid #eee;
}

/* 标签 */
.tag {
    padding: 3px 8px;
    border-radius: 4px;
    color: #fff;
    font-size: 12px;
}

.mark1 { background: #faad14; }
.mark2 { background: #1677ff; }
.mark3 { background: #52c41a; }
.mark4 { background: #722ed1; }

</style>
</head>

<body>

<div class="header">
    🚀 AI 智能体控制台（本地 Qwen + SQL Server）
</div>

<div class="input-bar">
    <textarea id="input" placeholder="例如：查待处理订单 / 删除订单2 / 给订单3备注：客户急单"></textarea>
    <button onclick="send()">执行</button>
</div>

<div class="container">

    <!-- 左侧表格 -->
    <div class="left">
        <table id="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>订单号</th>
                    <th>客户</th>
                    <th>状态</th>
                    <th>备注</th>
                    <th>金额</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- 右侧 JSON -->
    <div class="right" id="json">
        等待执行...
    </div>

</div>

<script>

async function send() {
    const text = document.getElementById('input').value.trim();
    if (!text) return;

    const res = await fetch('/api/agent/dispatch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
    });

    const data = await res.json();

    // 显示 JSON
    document.getElementById('json').innerText =
        JSON.stringify(data, null, 2);

    // 渲染表格
    renderTable(data.result || []);
}

/* 渲染表格 */
function renderTable(list) {
    const tbody = document.querySelector('#table tbody');
    tbody.innerHTML = '';

    list.forEach(item => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.order_no}</td>
            <td>${item.client_name}</td>
            <td>${renderMark(item.mark)}</td>
            <td>${item.remark || ''}</td>
            <td>${item.total_amount}</td>
        `;

        tbody.appendChild(tr);
    });
}

/* 状态标签 */
function renderMark(mark) {
    if (mark == 1) return '<span class="tag mark1">待处理</span>';
    if (mark == 2) return '<span class="tag mark2">处理中</span>';
    if (mark == 3) return '<span class="tag mark3">已处理</span>';
    if (mark == 4) return '<span class="tag mark4">备注</span>';
    return mark;
}

</script>

</body>
</html>
