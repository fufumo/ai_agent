<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 业务助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0f1419;
            color: #e0e0e0;
            font-family: 'Fira Code', 'SF Mono', -apple-system, monospace;
            line-height: 1.5;
        }
        
        #app {
            display: grid;
            grid-template-columns: 1fr 320px;
            min-height: 100vh;
            gap: 12px;
            padding: 12px;
        }
        
        .header {
            grid-column: 1 / -1;
            padding: 16px;
            background: #1a1f26;
            border: 1px solid #2a2f38;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #39f;
        }
        
        .header p {
            font-size: 12px;
            color: #888;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .status-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .status-card {
            background: #1a1f26;
            border: 1px solid #2a2f38;
            border-radius: 4px;
            padding: 12px;
            font-size: 12px;
        }
        
        .status-card .label {
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #666;
        }
        
        .status-indicator.active {
            background: #39f;
            box-shadow: 0 0 8px #39f;
        }
        
        .status-value {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: #39f;
            word-break: break-all;
        }
        
        .input-box {
            background: #1a1f26;
            border: 1px solid #2a2f38;
            border-radius: 4px;
            padding: 2px;
            display: flex;
            gap: 2px;
        }
        
        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e0e0;
            padding: 12px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        
        .input-box input::placeholder {
            color: #666;
        }
        
        .input-box button {
            background: #1e3a5f;
            color: #39f;
            border: 1px solid #39f;
            padding: 10px 16px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 2px;
            border-radius: 2px;
        }
        
        .input-box button:hover:not(:disabled) {
            background: #39f;
            color: #0f1419;
            box-shadow: 0 0 12px #39f;
        }
        
        .input-box button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .results-box {
            flex: 1;
            background: #1a1f26;
            border: 1px solid #2a2f38;
            border-radius: 4px;
            padding: 12px;
            overflow: auto;
        }
        
        .results-title {
            color: #39f;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-bottom: 1px solid #2a2f38;
            padding-bottom: 8px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        th {
            color: #888;
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #2a2f38;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 8px;
            border-bottom: 1px solid #2a2f38;
            color: #e0e0e0;
            word-break: break-word;
        }
        
        tr:hover {
            background: #0f1419;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #666;
            font-size: 12px;
        }
        
        .log-box {
            background: #0a0e13;
            border: 1px solid #2a2f38;
            border-radius: 4px;
            height: 100%;
            display: flex;
            flex-direction: column;
            font-size: 11px;
        }
        
        .log-header {
            padding: 8px;
            border-bottom: 1px solid #2a2f38;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-dots {
            display: flex;
            gap: 4px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
        }
        
        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            color: #39f;
            background: #0a0e13;
        }
        
        .log-line {
            margin-bottom: 6px;
            line-height: 1.4;
        }
        
        .log-time {
            color: #666;
            margin-right: 6px;
        }
        
        .log-msg {
            color: #39f;
        }
        
        .log-msg.error {
            color: #f66;
        }
        
        .log-msg.warn {
            color: #fa0;
        }
        
        .log-msg.success {
            color: #6f6;
        }
        
        .log-data {
            margin-top: 4px;
            padding: 6px;
            background: #000;
            border-left: 2px solid #39f;
            font-size: 10px;
            color: #888;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0a0e13;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #2a2f38;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #39f;
        }
        
        .blink {
            animation: blink 1.2s infinite;
        }
        
        @keyframes blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.2; }
        }
        
        @media (max-width: 1024px) {
            #app {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="header">
            <h1>$ AI-Assistant</h1>
            <p>智能指令解析系统 v1.0</p>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Status Panel -->
            <div class="status-panel">
                <div class="status-card">
                    <div class="label">
                        <span>Layer 1</span>
                        <span class="status-indicator" :class="{active: currentModule}"></span>
                    </div>
                    <div class="status-value">{{ currentModule || "---" }}</div>
                </div>
                <div class="status-card">
                    <div class="label">
                        <span>Layer 2</span>
                        <span class="status-indicator" :class="{active: currentAction}"></span>
                    </div>
                    <div class="status-value">{{ currentAction || "---" }}</div>
                </div>
                <div class="status-card">
                    <div class="label">
                        <span>Layer 3</span>
                        <span class="status-indicator" :class="{active: currentArgs && currentArgs !== '{}'}"></span>
                    </div>
                    <div class="status-value" style="font-size: 11px; overflow-x: auto;">{{ currentArgs || "{}" }}</div>
                </div>
            </div>

            <!-- Input Box -->
            <div class="input-box">
                <input 
                    v-model="inputText" 
                    @keyup.enter="handleSend"
                    placeholder="$ 输入指令..."
                    :disabled="loading"
                />
                <button @click="handleSend" :disabled="loading || !inputText.trim()">
                    {{ loading ? "执行中" : "执行" }}
                </button>
            </div>

            <!-- Results Box -->
            <div class="results-box">
                <div v-if="tableData.length > 0">
                    <div class="results-title">✓ 结果 ({{ tableData.length }} 行)</div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th v-for="key in Object.keys(tableData[0])" :key="key">{{ key }}</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr v-for="(item, idx) in tableData" :key="idx">
                                    <td v-for="val in item" :key="val">{{ val ?? "—" }}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div v-else-if="!loading" class="empty-state">
                    <div>$ 等待指令...</div>
                </div>
                <div v-else class="empty-state">
                    <div class="blink">$ 处理中...</div>
                </div>
            </div>
        </div>

        <!-- Log Console -->
        <div class="log-box">
            <div class="log-header">
                <span>📋 Ollama Log</span>
                <div class="status-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
            <div class="log-content">
                <div v-if="logs.length === 0" style="color: #666;">
                    [*] 系统就绪
                </div>
                <div v-for="(log, i) in logs" :key="i" class="log-line">
                    <span class="log-time">[{{ log.time }}]</span>
                    <span class="log-msg" :class="log.type">{{ log.msg }}</span>
                    <div v-if="log.data" class="log-data">{{ log.data }}</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const inputText = ref('');
                const loading = ref(false);
                const currentModule = ref('');
                const currentAction = ref('');
                const currentArgs = ref('');
                const tableData = ref([]);
                const logs = ref([]);

                const addLog = (msg, type = 'info', data = null) => {
                    const time = new Date().toLocaleTimeString().slice(0, 8);
                    logs.value.unshift({ msg, type, time, data });
                    if (logs.value.length > 50) logs.value.pop();
                };

                const handleSend = async () => {
                    if (!inputText.value.trim() || loading.value) return;

                    const userInput = inputText.value;
                    addLog(`$ ${userInput}`, 'info');
                    inputText.value = '';
                    loading.value = true;
                    tableData.value = [];

                    try {
                        addLog('正在识别意图...', 'warn');
                        
                        const response = await fetch('/api/agent/dispatch', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: userInput })
                        });

                        const result = await response.json();

                        if (result.success) {
                            currentModule.value = result.analysis?.module || '';
                            currentAction.value = result.analysis?.action || '';
                            currentArgs.value = JSON.stringify(result.analysis?.args || {});
                            
                            addLog(`识别模块: ${result.analysis?.module}`, 'success');
                            addLog(`匹配动作: ${result.analysis?.action}`, 'success');
                            
                            const argsStr = JSON.stringify(result.analysis?.args || {});
                            if (argsStr.length > 100) {
                                addLog(`提取参数: ${argsStr.slice(0, 100)}...`, 'success', argsStr);
                            } else {
                                addLog(`提取参数: ${argsStr}`, 'success');
                            }
                            
                            tableData.value = Array.isArray(result.result) ? result.result : [];
                            addLog(`执行成功 (${tableData.value.length} 行记录)`, 'success');
                        } else {
                            addLog(`错误: ${result.msg}`, 'error');
                        }
                    } catch (error) {
                        addLog(`连接失败: ${error.message}`, 'error');
                    } finally {
                        loading.value = false;
                    }
                };

                return {
                    inputText,
                    loading,
                    currentModule,
                    currentAction,
                    currentArgs,
                    tableData,
                    logs,
                    handleSend
                };
            }
        }).mount('#app');
    </style>
</body>
</html>
                <div class="bg-slate-900 rounded-2xl p-5 shadow-2xl h-[600px] flex flex-col border border-slate-800">
                    <div class="flex items-center gap-2 mb-4 border-b border-slate-800 pb-3">
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/20 border border-yellow-500/50"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/20 border border-green-500/50"></div>
                        </div>
                        <span class="text-[10px] text-slate-500 font-mono ml-2 uppercase">Ollama Reasoning Log</span>
                    </div>
                    <div class="flex-1 overflow-auto font-mono text-[11px] leading-relaxed text-emerald-500/90 custom-scrollbar">
                        <div v-for="(log, i) in logs" :key="i" class="mb-2">
                            <span class="text-slate-600">[{{ log.time }}]</span> 
                            <span :class="log.type === 'error' ? 'text-red-400' : 'text-emerald-500'"> {{ log.msg }}</span>
                            <pre v-if="log.data" class="mt-1 p-2 bg-black/30 rounded text-slate-400 overflow-x-auto">{{ JSON.stringify(log.data, null, 2) }}</pre>
                        </div>
                        <div v-if="loading" class="animate-pulse">_</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;

        createApp({
            setup() {
                const inputText = ref('');
                const loading = ref(false);
                const tableData = ref([]);
                const currentModule = ref('');
                const currentAction = ref('');
                const currentArgs = ref('');
                const logs = ref([]);

                const addLog = (msg, type = 'info', data = null) => {
                    logs.value.unshift({
                        time: new Date().toLocaleTimeString().split(' ')[0],
                        msg,
                        type,
                        data
                    });
                };

                const handleSend = async () => {
                    const text = inputText.value.trim();
                    if (!text || loading.value) return;

                    loading.value = true;
                    tableData.value = [];
                    addLog(`收到用户指令: "${text}"`);
                    addLog(`正在调用 Ollama (MODEL: qwen2.5:3b)...`);

                    try {
                        const res = await fetch('/api/agent/dispatch', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text })
                        });
                        const data = await res.json();

                        if (data.success) {
                            currentModule.value = data.analysis.module;
                            currentAction.value = data.analysis.action;
                            currentArgs.value = JSON.stringify(data.analysis.args);
                            
                            addLog(`Layer 1 & 2 解析成功`, 'info', { 
                                module: data.analysis.module, 
                                action: data.analysis.action 
                            });
                            addLog(`Layer 3 参数提取成功`, 'info', data.analysis.args);

                            tableData.value = Array.isArray(data.result) ? data.result : [data.result];
                            addLog(`业务逻辑执行完毕，获取到 ${tableData.value.length} 条记录`);
                        } else {
                            addLog(`解析失败: ${data.msg}`, 'error');
                            alert('AI 理解出现偏差: ' + data.msg);
                        }
                    } catch (e) {
                        addLog(`系统错误: ${e.message}`, 'error');
                    } finally {
                        loading.value = false;
                        inputText.value = '';
                    }
                };

                return { 
                    inputText, loading, tableData, 
                    currentModule, currentAction, currentArgs, 
                    logs, handleSend 
                };
            }
        }).mount('#app');
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</body>
</html>
